<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiteboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1b1e;
    --surface: #25262b;
    --surface2: #2c2d33;
    --border: rgba(255,255,255,0.08);
    --text: #e8e9ef;
    --muted: #868e96;
    --accent: #4dabf7;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }
  #topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    gap: 8px;
  }
  .logo { font-size: 14px; font-weight: 600; }
  .actions { display: flex; gap: 6px; align-items: center; }
  .btn {
    height: 30px; border: 1px solid var(--border); background: transparent; color: var(--text);
    border-radius: 8px; padding: 0 9px; font-size: 12px; cursor: pointer; transition: all .18s ease;
  }
  .btn:hover { background: var(--surface2); transform: translateY(-1px); }
  #workspace { flex: 1; display: flex; min-height: 0; }
  #toolbar {
    width: 52px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 0;
  }
  .tool {
    width: 38px; height: 38px; border-radius: 8px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; font-size: 11px;
  }
  .tool.active, .tool:hover { background: var(--surface2); color: var(--text); }
  #canvas-wrap { flex: 1; position: relative; background: #f8f9fa; overflow: hidden; }
  #canvas-wrap.pan { cursor: grab; }
  #canvas-wrap.panning { cursor: grabbing; }
  #canvas-wrap.text { cursor: text; }
  #canvas-wrap.eraser { cursor: cell; }
  canvas { position: absolute; inset: 0; }
  #grid { pointer-events: none; opacity: .45; }
  #overlay { pointer-events: none; }
  #text-input {
    position: absolute; display: none; border: none; outline: 2px dashed rgba(77,171,247,.55);
    background: transparent; color: #111; font-family: 'DM Sans', sans-serif; resize: none;
    min-width: 120px; min-height: 34px; padding: 2px 4px; z-index: 20;
  }
  #bottom {
    position: absolute; left: 8px; right: 8px; bottom: 8px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 7px 8px; display: flex; gap: 8px; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .swatch { width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .swatch.active { border-color: #fff; }
  .stroke { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; background: #111; cursor: pointer; }
  .stroke.active { border-color: var(--accent); }
  #status {
    position: absolute; top: 8px; right: 10px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px; color: var(--muted); font-size: 11px;
  }
  .sep { width: 1px; height: 24px; background: var(--border); }
  @media (max-width: 560px) {
    .btn span { display: none; }
    #toolbar { width: 48px; }
    .tool { width: 34px; height: 34px; }
  }
</style>
</head>
<body>
  <div id="topbar">
    <div class="logo">Whiteboard</div>
    <div class="actions">
      <button class="btn" id="undo">Undo</button>
      <button class="btn" id="redo">Redo</button>
      <button class="btn" id="clear">Clear</button>
      <button class="btn" id="export">Export</button>
      <input id="upload-input" type="file" accept="image/*" style="display:none" />
      <button class="btn" id="upload">Upload</button>
    </div>
  </div>

  <div id="workspace">
    <div id="toolbar">
      <button class="tool active" data-tool="pen">Pen</button>
      <button class="tool" data-tool="highlighter">Mark</button>
      <button class="tool" data-tool="line">Line</button>
      <button class="tool" data-tool="rect">Rect</button>
      <button class="tool" data-tool="ellipse">Oval</button>
      <button class="tool" data-tool="text">Text</button>
      <button class="tool" data-tool="eraser">Erase</button>
      <button class="tool" data-tool="pan">Pan</button>
    </div>
    <div id="canvas-wrap">
      <canvas id="grid"></canvas>
      <canvas id="view"></canvas>
      <canvas id="overlay"></canvas>
      <textarea id="text-input" rows="1"></textarea>
      <div id="status">100%</div>
      <div id="bottom">
        <div id="colors" style="display:flex; gap:5px;"></div>
        <div class="sep"></div>
        <div id="strokes" style="display:flex; gap:5px;"></div>
        <div class="sep"></div>
        <div style="display:flex; gap:6px; align-items:center; font-size:12px; color:var(--muted)">
          Opacity <input id="opacity" type="range" min="5" max="100" value="100" step="5" /> <span id="opacity-label">100%</span>
        </div>
        <div class="sep"></div>
        <div style="display:flex; gap:4px; align-items:center;">
          <button class="btn" id="zoom-out">-</button>
          <span id="zoom-label" style="min-width:40px; text-align:center; font-size:12px;">100%</span>
          <button class="btn" id="zoom-in">+</button>
          <button class="btn" id="zoom-fit">Fit</button>
        </div>
      </div>
    </div>
  </div>

<script>
const COLORS = ['#111111','#e03131','#f08c00','#2f9e44','#1971c2','#862e9c','#f783ac','#868e96','#ffffff'];
const STROKES = [2,4,8,14,22];

let tool = 'pen';
let color = '#111111';
let stroke = 4;
let opacity = 1;
let zoom = 1;
let panX = 0;
let panY = 0;
let drawing = false;
let panning = false;
let sx = 0, sy = 0, lx = 0, ly = 0;
let spaceDown = false;
let history = [];
let redo = [];

const wrap = document.getElementById('canvas-wrap');
const view = document.getElementById('view');
const overlay = document.getElementById('overlay');
const grid = document.getElementById('grid');
const vctx = view.getContext('2d');
const octx = overlay.getContext('2d');
const gctx = grid.getContext('2d');
const textInput = document.getElementById('text-input');

const board = document.createElement('canvas');
const bctx = board.getContext('2d');

function initBoard(w,h){
  board.width = Math.max(1,w);
  board.height = Math.max(1,h);
  bctx.fillStyle = '#fff';
  bctx.fillRect(0,0,board.width,board.height);
}

function clampPan(){
  const minX = view.width - board.width * zoom;
  const minY = view.height - board.height * zoom;
  if (board.width * zoom <= view.width) panX = (view.width - board.width * zoom)/2; else panX = Math.min(0, Math.max(minX, panX));
  if (board.height * zoom <= view.height) panY = (view.height - board.height * zoom)/2; else panY = Math.min(0, Math.max(minY, panY));
}

function resize(){
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  [view, overlay, grid].forEach(c => { c.width=w; c.height=h; });
  if (!board.width || !board.height) initBoard(w,h);
  clampPan();
  render();
  drawGrid();
}
window.addEventListener('resize', resize);

function drawGrid(){
  gctx.clearRect(0,0,grid.width,grid.height);
  const step = 40 * zoom;
  const ox = ((panX % step) + step) % step;
  const oy = ((panY % step) + step) % step;
  gctx.strokeStyle = '#ccced0';
  gctx.lineWidth = .7;
  gctx.beginPath();
  for(let x=ox; x<grid.width; x+=step){ gctx.moveTo(x,0); gctx.lineTo(x,grid.height); }
  for(let y=oy; y<grid.height; y+=step){ gctx.moveTo(0,y); gctx.lineTo(grid.width,y); }
  gctx.stroke();
}

function render(){
  vctx.clearRect(0,0,view.width,view.height);
  vctx.save();
  vctx.setTransform(zoom,0,0,zoom,panX,panY);
  vctx.drawImage(board,0,0);
  vctx.restore();
  octx.clearRect(0,0,overlay.width,overlay.height);
}

function saveHistory(){ history.push(board.toDataURL()); if(history.length>60) history.shift(); redo=[]; }
function loadBoard(url){
  const img = new Image();
  img.onload = ()=>{ bctx.fillStyle='#fff'; bctx.fillRect(0,0,board.width,board.height); bctx.drawImage(img,0,0,board.width,board.height); render(); };
  img.src = url;
}

function toWorld(x,y){ return { x:(x-panX)/zoom, y:(y-panY)/zoom }; }
function toScreen(x,y){ return { x:x*zoom+panX, y:y*zoom+panY }; }

function setZoom(next, cx=view.width/2, cy=view.height/2){
  const old = zoom;
  zoom = Math.max(.2, Math.min(4, next));
  const factor = zoom/old;
  panX = cx - ((cx - panX) * factor);
  panY = cy - ((cy - panY) * factor);
  clampPan();
  document.getElementById('zoom-label').textContent = Math.round(zoom*100)+'%';
  document.getElementById('status').textContent = Math.round(zoom*100)+'%';
  drawGrid();
  render();
}

function setTool(next){
  tool = next;
  document.querySelectorAll('.tool').forEach(b=>b.classList.toggle('active', b.dataset.tool===tool));
  wrap.classList.remove('pan','panning','text','eraser');
  if (tool==='pan' || spaceDown) wrap.classList.add('pan');
  if (tool==='text') wrap.classList.add('text');
  if (tool==='eraser') wrap.classList.add('eraser');
}

function hexA(hex,a){
  let c = hex.replace('#',''); if(c.length===3) c=c.split('').map(v=>v+v).join('');
  const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawShape(c, shape, x1,y1,x2,y2, isOverlay=false){
  c.save();
  c.strokeStyle = hexA(color, opacity);
  c.fillStyle = hexA(color, opacity*.08);
  c.lineWidth = isOverlay ? stroke*zoom : stroke;
  const dx = isOverlay ? panX : 0, dy = isOverlay ? panY : 0, s = isOverlay ? zoom : 1;
  const a1 = {x:x1*s+dx,y:y1*s+dy}, a2={x:x2*s+dx,y:y2*s+dy};
  if(shape==='line'){
    c.beginPath(); c.moveTo(a1.x,a1.y); c.lineTo(a2.x,a2.y); c.stroke();
  } else if(shape==='rect'){
    const rx=Math.min(a1.x,a2.x), ry=Math.min(a1.y,a2.y), rw=Math.abs(a2.x-a1.x), rh=Math.abs(a2.y-a1.y);
    c.beginPath(); c.roundRect(rx,ry,rw,rh,4); c.fill(); c.stroke();
  } else if(shape==='ellipse'){
    const cx=(a1.x+a2.x)/2, cy=(a1.y+a2.y)/2, rx=Math.abs(a2.x-a1.x)/2, ry=Math.abs(a2.y-a1.y)/2;
    c.beginPath(); c.ellipse(cx,cy,Math.max(rx,1),Math.max(ry,1),0,0,Math.PI*2); c.fill(); c.stroke();
  }
  c.restore();
}

function commitText(){
  if(textInput.style.display==='none' || !textInput.value.trim()){ textInput.style.display='none'; return; }
  const x = Number(textInput.dataset.wx||0), y = Number(textInput.dataset.wy||0);
  const fs = stroke*3+14;
  const lines = textInput.value.split('\n');
  bctx.save(); bctx.globalAlpha=opacity; bctx.fillStyle=color; bctx.font = `${fs}px 'DM Sans', sans-serif`; bctx.textBaseline='top';
  lines.forEach((line,i)=> bctx.fillText(line, x, y + i*fs*1.4));
  bctx.restore();
  textInput.style.display='none';
  render();
  notifyBoardChanged();
}

wrap.addEventListener('mousedown',(e)=>{
  const r = wrap.getBoundingClientRect();
  const mx = e.clientX-r.left, my=e.clientY-r.top;
  if(spaceDown || tool==='pan'){
    panning = true; sx = e.clientX - panX; sy = e.clientY - panY; wrap.classList.add('panning'); return;
  }
  if(tool==='text'){
    commitText();
    const w = toWorld(mx,my); const s = toScreen(w.x,w.y);
    textInput.style.display='block'; textInput.style.left = s.x+'px'; textInput.style.top=(s.y-2)+'px'; textInput.style.fontSize=(stroke*3+14)*Math.max(1,Math.min(zoom,1.6))+'px';
    textInput.style.color=color; textInput.value=''; textInput.dataset.wx=String(w.x); textInput.dataset.wy=String(w.y); setTimeout(()=>textInput.focus(),10);
    return;
  }
  drawing = true;
  const w = toWorld(mx,my); sx=w.x; sy=w.y; lx=w.x; ly=w.y;
  saveHistory();
  if(tool==='pen' || tool==='highlighter'){
    bctx.beginPath(); bctx.moveTo(w.x,w.y); bctx.strokeStyle=hexA(color, tool==='highlighter'?Math.min(opacity,.4):opacity);
    bctx.lineWidth = tool==='highlighter'?stroke*3:stroke; bctx.lineCap='round'; bctx.lineJoin='round'; bctx.globalCompositeOperation = tool==='highlighter'?'multiply':'source-over';
  } else if(tool==='eraser'){
    bctx.globalCompositeOperation='destination-out'; bctx.lineWidth=stroke*3; bctx.lineCap='round'; bctx.lineJoin='round'; bctx.beginPath(); bctx.moveTo(w.x,w.y);
  }
});

wrap.addEventListener('mousemove',(e)=>{
  const r = wrap.getBoundingClientRect();
  const mx = e.clientX-r.left, my=e.clientY-r.top;
  if(panning){
    panX = e.clientX - sx; panY = e.clientY - sy; clampPan(); drawGrid(); render(); return;
  }
  if(!drawing) return;
  const w = toWorld(mx,my);
  if(tool==='pen' || tool==='highlighter' || tool==='eraser'){
    bctx.lineTo(w.x,w.y); bctx.stroke(); lx=w.x; ly=w.y; render();
  } else {
    octx.clearRect(0,0,overlay.width,overlay.height); drawShape(octx, tool, sx,sy,w.x,w.y, true); lx=w.x; ly=w.y;
  }
});

function endDraw(mx,my){
  if(panning){ panning=false; wrap.classList.remove('panning'); return; }
  if(!drawing) return;
  drawing=false;
  const w = toWorld(mx,my);
  if(['line','rect','ellipse'].includes(tool)){ drawShape(bctx, tool, sx,sy,w.x,w.y, false); render(); }
  bctx.globalCompositeOperation='source-over';
  notifyBoardChanged();
}

wrap.addEventListener('mouseup',(e)=>{ const r=wrap.getBoundingClientRect(); endDraw(e.clientX-r.left,e.clientY-r.top); });
wrap.addEventListener('mouseleave',()=>{ if(panning){panning=false; wrap.classList.remove('panning');} if(drawing){ drawShape(bctx, tool, sx,sy,lx,ly,false); drawing=false; bctx.globalCompositeOperation='source-over'; render(); notifyBoardChanged(); } });

wrap.addEventListener('wheel',(e)=>{ e.preventDefault(); const r=wrap.getBoundingClientRect(); setZoom(zoom*(e.deltaY>0?.9:1.1), e.clientX-r.left, e.clientY-r.top); }, {passive:false});

document.getElementById('zoom-in').onclick = ()=>setZoom(zoom*1.2);
document.getElementById('zoom-out').onclick = ()=>setZoom(zoom/1.2);
document.getElementById('zoom-fit').onclick = ()=>{ zoom=1; panX=0; panY=0; clampPan(); document.getElementById('zoom-label').textContent='100%'; document.getElementById('status').textContent='100%'; drawGrid(); render(); };

const colorBox = document.getElementById('colors');
COLORS.forEach(c=>{ const el=document.createElement('div'); el.className='swatch'+(c===color?' active':''); el.style.background=c; el.onclick=()=>{ color=c; [...document.querySelectorAll('.swatch')].forEach(s=>s.classList.remove('active')); el.classList.add('active'); }; colorBox.appendChild(el); });
const strokeBox = document.getElementById('strokes');
STROKES.forEach(s=>{ const el=document.createElement('div'); el.className='stroke'+(s===stroke?' active':''); el.style.width=el.style.height=Math.min(s+10,24)+'px'; el.onclick=()=>{ stroke=s; [...document.querySelectorAll('.stroke')].forEach(k=>k.classList.remove('active')); el.classList.add('active'); }; strokeBox.appendChild(el); });

document.getElementById('opacity').addEventListener('input',(e)=>{ opacity=Number(e.target.value)/100; document.getElementById('opacity-label').textContent=e.target.value+'%'; });

document.querySelectorAll('.tool').forEach(b=>b.onclick=()=>setTool(b.dataset.tool));

document.getElementById('undo').onclick=()=>{ if(!history.length) return; redo.push(board.toDataURL()); loadBoard(history.pop()); notifyBoardChanged(); };
document.getElementById('redo').onclick=()=>{ if(!redo.length) return; history.push(board.toDataURL()); loadBoard(redo.pop()); notifyBoardChanged(); };
document.getElementById('clear').onclick=()=>{ if(!confirm('Clear the whiteboard?')) return; saveHistory(); bctx.fillStyle='#fff'; bctx.fillRect(0,0,board.width,board.height); render(); notifyBoardChanged(); };

document.getElementById('export').onclick=()=>{ commitText(); const a=document.createElement('a'); a.href=board.toDataURL('image/png'); a.download='whiteboard-'+Date.now()+'.png'; a.click(); };

document.getElementById('upload').onclick=()=>document.getElementById('upload-input').click();
document.getElementById('upload-input').addEventListener('change',(e)=>{
  const file = e.target.files?.[0]; if(!file) return;
  const rd = new FileReader();
  rd.onload = ()=>{ const img=new Image(); img.onload=()=>{ saveHistory(); const margin=24; const tw=Math.max(40,board.width-margin*2); const th=Math.max(40,board.height-margin*2); const sc=Math.min(tw/img.width, th/img.height, 1); const dw=Math.max(1,Math.round(img.width*sc)); const dh=Math.max(1,Math.round(img.height*sc)); const x=Math.round((board.width-dw)/2); const y=Math.round((board.height-dh)/2); bctx.drawImage(img,x,y,dw,dh); render(); notifyBoardChanged(); }; img.src=rd.result; };
  rd.readAsDataURL(file); e.target.value='';
});

textInput.addEventListener('keydown',(e)=>{ if(e.key==='Escape'){textInput.style.display='none';} else if(e.key==='Enter' && e.shiftKey){ e.preventDefault(); commitText(); } e.stopPropagation(); });
textInput.addEventListener('blur',()=>setTimeout(commitText,100));

document.addEventListener('keydown',(e)=>{
  if(e.target===textInput) return;
  if(e.code==='Space'){ e.preventDefault(); spaceDown=true; setTool('pan'); }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); document.getElementById('undo').click(); }
  if((e.ctrlKey||e.metaKey)&&(e.key==='y' || (e.shiftKey&&e.key==='z'))){ e.preventDefault(); document.getElementById('redo').click(); }
});
document.addEventListener('keyup',(e)=>{ if(e.code==='Space'){ spaceDown=false; if(tool==='pan') setTool('pen'); } });

['touchstart','touchmove','touchend'].forEach(type=>{
  wrap.addEventListener(type,(e)=>{
    e.preventDefault();
    const t = e.touches?.[0] || e.changedTouches?.[0];
    if(type==='touchstart' && t) wrap.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY}));
    if(type==='touchmove' && t) wrap.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));
    if(type==='touchend') wrap.dispatchEvent(new MouseEvent('mouseup',{}));
  }, {passive:false});
});

function exportBoardDataUrl(){ return board.toDataURL('image/png'); }
function importBoardDataUrl(url){ if(!url) return; const img=new Image(); img.onload=()=>{ saveHistory(); bctx.fillStyle='#fff'; bctx.fillRect(0,0,board.width,board.height); bctx.drawImage(img,0,0,board.width,board.height); render(); }; img.src=url; }
let syncDebounce=null;
function notifyBoardChanged(){ if(syncDebounce) clearTimeout(syncDebounce); syncDebounce=setTimeout(()=>window.parent?.postMessage({type:'WB_STATE_UPDATE', dataUrl:exportBoardDataUrl()}, '*'), 220); }
window.addEventListener('message',(event)=>{ const d=event.data||{}; if(d.type==='WB_CLEAR'){ saveHistory(); bctx.fillStyle='#fff'; bctx.fillRect(0,0,board.width,board.height); render(); notifyBoardChanged(); } else if(d.type==='WB_SNAPSHOT_REQUEST'){ window.parent?.postMessage({type:'WB_STATE_UPDATE', dataUrl:exportBoardDataUrl()}, '*'); } else if(d.type==='WB_APPLY_STATE'){ importBoardDataUrl(d.dataUrl); } });

resize();
setTool('pen');
</script>
</body>
</html>
